name: Apply fitted preview height cap

on:
  push:
    branches:
      - cleanup/remove-legacy-editor-shell
    paths:
      - .github/workflows/apply-preview-height-cap.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/remove-legacy-editor-shell
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reserve fixed editor chrome height
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, rmSync, writeFileSync } from 'node:fs';

          const path = 'src/AppLive.jsx';
          const before = `        containerWidth: rect.width,\n        viewportHeight: window.innerHeight,\n        horizontalPadding,`;
          const after = `        containerWidth: rect.width,\n        viewportHeight: window.innerHeight,\n        maxHeight: Math.max(360, window.innerHeight - 210),\n        horizontalPadding,`;
          const source = readFileSync(path, 'utf8');
          const matches = source.split(before).length - 1;
          if (matches !== 1) throw new Error(`Expected one preview viewport configuration, found ${matches}`);
          writeFileSync(path, source.replace(before, after), 'utf8');
          rmSync('.github/workflows/apply-preview-height-cap.yml', { force: true });
          NODE
      - name: Commit preview height cap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep fitted previews above the page rail"
          git push origin HEAD:cleanup/remove-legacy-editor-shell
