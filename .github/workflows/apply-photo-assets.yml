name: Apply photo asset patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/photo-blob-storage' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/photo-blob-storage
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Repair temporary patch anchors
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_photo_asset_patch.py')
          text = path.read_text(encoding='utf-8')
          old = '''app = replace_once(app,
          """<small>{photoImporting ? 'Оригиналы читаются по очереди' : 'Можно сразу несколько'}</small>
          """,
          """<small>{photoImporting ? 'Оригиналы сохраняются по очереди' : 'Можно сразу несколько'}</small>
          """,
          'photo upload status copy')'''
          new = '''app = app.replace(
              "Оригиналы читаются по очереди",
              "Оригиналы сохраняются по очереди",
              1,
          )'''
          if old not in text:
              raise SystemExit('temporary photo status anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Apply verified source patch
        id: patch
        shell: bash
        run: |
          set +e
          python scripts/apply_photo_asset_patch.py > patch-output.txt 2>&1
          status=$?
          cat patch-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: photo-asset-patch-output
          path: patch-output.txt
      - name: Preserve patch result
        run: exit "${{ steps.patch.outputs.status }}"
      - name: Adjust asynchronous cloud save test
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('public/cloud-auth.test.mjs')
          text = path.read_text(encoding='utf-8')
          old = '''  const first = harness.api.saveAsNew();
            const second = harness.api.saveAsNew();
            assert.equal(calls.filter((call) => call.method === 'POST').length, 1, 'rapid clicks must create only one copy');'''
          new = '''  const first = harness.api.saveAsNew();
            const second = harness.api.saveAsNew();
            await Promise.resolve();
            await Promise.resolve();
            assert.equal(calls.filter((call) => call.method === 'POST').length, 1, 'rapid clicks must create only one copy');'''
          if old not in text:
              raise SystemExit('cloud timing test anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Install dependencies
        run: npm ci
      - name: Validate patch
        id: validation
        shell: bash
        run: |
          set +e
          : > validation-output.txt
          status=0
          for command in "npm run lint" "npm test" "npm run build" "git diff --check"; do
            echo "===== $command =====" | tee -a validation-output.txt
            bash -lc "$command" 2>&1 | tee -a validation-output.txt
            command_status=${PIPESTATUS[0]}
            if [ "$command_status" -ne 0 ]; then
              status=$command_status
              break
            fi
          done
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: photo-asset-validation-output
          path: validation-output.txt
      - name: Preserve validation result
        run: exit "${{ steps.validation.outputs.status }}"
      - name: Commit patched editor
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx public/cloud-auth.js public/cloud-auth.test.mjs index.html
          if git diff --cached --quiet; then
            echo "Patch already applied"
            exit 0
          fi
          git commit -m "Apply IndexedDB photo asset integration"
          git push origin HEAD:agent/photo-blob-storage
