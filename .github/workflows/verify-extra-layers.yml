name: Extract and verify extra layers

on:
  push:
    branches: [agent/extract-extra-layers]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/extract-extra-layers
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Extract extra layer helpers
        run: python .github/scripts/extract-extra-layers.py
      - name: Install dependencies
        run: npm ci
      - name: Collect lint report
        id: lint
        continue-on-error: true
        run: npm run lint -- --format json > eslint-report.json
      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: extra-layers-eslint-report
          path: eslint-report.json
      - name: Stop on lint errors
        if: steps.lint.outcome != 'success'
        run: exit 1
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Verify focused diff
        run: |
          rm -f eslint-report.json
          git diff --check
          python - <<'PY'
          import subprocess
          allowed = {
              'package.json',
              'src/AppLive.jsx',
          }
          changed = set(subprocess.check_output(['git', 'diff', '--name-only'], text=True).splitlines())
          unexpected = changed - allowed
          if unexpected:
              raise SystemExit(f'Unexpected generated files: {sorted(unexpected)}')
          required = allowed
          if not required.issubset(changed):
              raise SystemExit(f'Missing expected generated files: {sorted(required - changed)}')
          PY
      - name: Commit verified extraction
        run: |
          rm -rf node_modules dist
          rm -f eslint-report.json .github/workflows/verify-extra-layers.yml .github/scripts/extract-extra-layers.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          python - <<'PY'
          import subprocess
          allowed = {
              '.github/scripts/extract-extra-layers.py',
              '.github/workflows/verify-extra-layers.yml',
              'package.json',
              'src/AppLive.jsx',
          }
          staged = set(subprocess.check_output(['git', 'diff', '--cached', '--name-only'], text=True).splitlines())
          unexpected = staged - allowed
          if unexpected:
              raise SystemExit(f'Unexpected staged files: {sorted(unexpected)}')
          if not allowed.issubset(staged):
              raise SystemExit(f'Missing expected staged files: {sorted(allowed - staged)}')
          print('\n'.join(sorted(staged)))
          PY
          git commit -m "Extract extra layer utilities"
          git push origin HEAD:agent/extract-extra-layers
