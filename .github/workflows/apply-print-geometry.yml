name: Apply print geometry patch

on:
  push:
    branches: [agent/print-geometry]
    paths:
      - '.github/scripts/apply_print_geometry.py'
      - '.github/scripts/run_print_geometry_patch.py'
      - '.github/workflows/apply-print-geometry.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/print-geometry
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply guarded patch
        run: python .github/scripts/run_print_geometry_patch.py
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx src/styles.css
          git diff --cached --check
          git commit -m "Connect physical print geometry to editor"
          git push origin HEAD:agent/print-geometry
