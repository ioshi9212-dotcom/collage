name: Editor shell v3 materialize

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply_editor_shell_v3.py
      - .github/workflows/editor-shell-v3-pr.yml
      - docs/editor-shell-v3.md

permissions:
  contents: write

jobs:
  materialize-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/editor-shell-v3-polish
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply guarded shell patch
        run: python3 scripts/apply_editor_shell_v3.py
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Focused browser test
        id: browser
        shell: bash
        run: |
          set +e
          npx playwright test e2e/editor-shell-v3.spec.js > browser.log 2>&1
          status=$?
          cat browser.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editor-shell-v3-browser-log
          path: browser.log
          if-no-files-found: error
      - name: Fail when browser tests failed
        if: steps.browser.outputs.status != '0'
        run: exit 1
      - name: Commit verified product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx src/editor-shell-v2.css e2e/booklet-print.spec.js e2e/editor-shell-v3.spec.js
          git diff --cached --quiet && exit 0
          git commit -m "Polish fixed editor shell and restore text drawing tools"
          git push origin HEAD:design/editor-shell-v3-polish
