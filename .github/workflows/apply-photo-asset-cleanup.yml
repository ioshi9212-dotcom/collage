name: Apply photo asset cleanup

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/photo-asset-gc' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/photo-asset-gc
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply guarded cleanup integration
        run: python scripts/apply_photo_asset_cleanup_patch.py
      - name: Install dependencies
        run: npm ci
      - name: Validate patch
        run: |
          npm run lint
          npm test
          npm run build
          git diff --check
      - name: Commit patched editor
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx
          if git diff --cached --quiet; then
            echo "Patch already applied"
            exit 0
          fi
          git commit -m "Run orphan photo cleanup safely"
          git push origin HEAD:agent/photo-asset-gc
