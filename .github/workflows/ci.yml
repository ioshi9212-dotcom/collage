name: Test and build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        id: tests
        shell: bash
        run: |
          set +e
          npm test > test-output.txt 2>&1
          status=$?
          cat test-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload test diagnostics
        if: steps.tests.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-test-output
          path: test-output.txt
      - name: Verify tests
        run: exit "${{ steps.tests.outputs.status }}"
      - name: Build
        run: npm run build
