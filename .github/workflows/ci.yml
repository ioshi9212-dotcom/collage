name: Test and build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Capture test output
        id: captured-tests
        shell: bash
        run: |
          set +e
          npm test > test-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photo-upload-test-output
          path: test-output.txt
          retention-days: 1
      - name: Fail when tests failed
        if: steps.captured-tests.outputs.exit_code != '0'
        run: exit 1
      - name: Build
        run: npm run build
