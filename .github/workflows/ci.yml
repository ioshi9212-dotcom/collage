name: Test and build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Capture lint output
        id: captured-lint
        shell: bash
        run: |
          set +e
          npm run lint > lint-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload lint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photo-import-lint-output
          path: lint-output.txt
          retention-days: 1
      - name: Fail when lint failed
        if: steps.captured-lint.outputs.exit_code != '0'
        run: exit 1
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
