name: Materialize booklet pair preview

on:
  push:
    branches: [agent/booklet-pair-fit-preview]
    paths:
      - '.github/scripts/apply_booklet_pair_fit.py'
      - '.github/workflows/materialize-booklet-pair-fit.yml'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/booklet-pair-fit-preview
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply guarded preview patch
        run: python .github/scripts/apply_booklet_pair_fit.py
      - name: Check patch
        run: git diff --check
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit verified editor changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx src/styles.css
          git commit -m "Fit booklet page pairs without scrollbars"
          git push origin HEAD:agent/booklet-pair-fit-preview
