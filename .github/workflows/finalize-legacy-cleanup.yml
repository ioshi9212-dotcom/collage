name: Finalize legacy shell cleanup

on:
  push:
    branches:
      - cleanup/remove-legacy-editor-shell
    paths:
      - .github/workflows/finalize-legacy-cleanup.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/remove-legacy-editor-shell
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Remove obsolete spread helper and diagnostics
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, rmSync, writeFileSync } from 'node:fs';

          const path = 'src/AppLive.jsx';
          const before = `\n\n  function goSpread(direction) {\n    const next = direction === 'next' ? Math.min(pages.length - 1, spreadStart + 2) : Math.max(0, spreadStart - 2);\n    setAlbum((current) => ({ ...current, currentPageId: pages[next]?.id ?? pages[0].id }));\n    setMoveFrameWithPhotoId(null);\n  }\n`;
          const source = readFileSync(path, 'utf8');
          const matches = source.split(before).length - 1;
          if (matches !== 1) throw new Error(`Expected one goSpread block, found ${matches}`);
          writeFileSync(path, source.replace(before, '\n'), 'utf8');
          rmSync('cleanup-lint-output.txt', { force: true });
          rmSync('.github/workflows/finalize-legacy-cleanup.yml', { force: true });
          NODE
      - name: Verify lint
        run: |
          npm ci
          npm run lint
      - name: Commit final cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove obsolete spread helper"
          git push origin HEAD:cleanup/remove-legacy-editor-shell
