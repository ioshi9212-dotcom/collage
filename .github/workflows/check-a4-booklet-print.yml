name: Check A4 booklet print patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/scripts/a4_booklet_*.py'
      - '.github/workflows/check-a4-booklet-print.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/a4-booklet-home-print
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Patch imports
        run: python .github/scripts/a4_booklet_imports.py
      - name: Patch defaults
        run: python .github/scripts/a4_booklet_defaults.py
      - name: Patch downloads
        run: python .github/scripts/a4_booklet_download.py
      - name: Patch normalization
        run: python .github/scripts/a4_booklet_normalize.py
      - name: Patch derived geometry
        run: python .github/scripts/a4_booklet_derived.py
      - name: Patch export helpers
        run: python .github/scripts/a4_booklet_export_helpers.py
      - name: Patch PDF export
        run: python .github/scripts/a4_booklet_export_pdf.py
      - name: Patch settings UI
        run: python .github/scripts/a4_booklet_ui_settings.py
      - name: Patch summary UI
        run: python .github/scripts/a4_booklet_ui_summary.py
      - name: Patch export UI
        run: python .github/scripts/a4_booklet_ui_export.py
      - name: Patch hidden stage size
        run: python .github/scripts/a4_booklet_hidden_size.py
      - name: Patch hidden stage positions
        run: python .github/scripts/a4_booklet_hidden_positions.py
      - name: Check patch
        run: git diff --check
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Upload verified editor
        uses: actions/upload-artifact@v4
        with:
          name: a4-booklet-editor
          path: src/AppLive.jsx
          if-no-files-found: error
          retention-days: 1
