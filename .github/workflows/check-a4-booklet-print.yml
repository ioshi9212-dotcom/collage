name: Check A4 booklet print patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/scripts/a4_booklet_*.py'
      - '.github/workflows/check-a4-booklet-print.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/a4-booklet-home-print
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply patches
        run: |
          for script in imports defaults download normalize derived export_helpers export_pdf ui_settings ui_summary ui_export hidden_size hidden_positions; do
            python .github/scripts/a4_booklet_${script}.py
          done
      - name: Check patch
        run: git diff --check
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        id: suite
        continue-on-error: true
        run: npm test > full-test.log 2>&1
      - name: Upload candidate and log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a4-booklet-diagnostic
          path: |
            src/AppLive.jsx
            full-test.log
          retention-days: 1
      - name: Require tests
        if: steps.suite.outcome == 'failure'
        run: exit 1
      - name: Build
        run: npm run build
