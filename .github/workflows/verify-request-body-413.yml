name: Apply and verify HTTP 413 handling

on:
  pull_request:
    branches: [main]
    paths:
      - 'server.js'
      - 'server/requestBody.js'
      - 'server/requestBody.test.mjs'
      - 'package.json'
      - '.github/scripts/apply_request_body_413.py'
      - '.github/workflows/verify-request-body-413.yml'

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply exact server patch
        run: python .github/scripts/apply_request_body_413.py
      - name: Install dependencies
        run: npm install --no-package-lock
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Verify focused diff
        run: |
          git diff --check
          test "$(git diff --name-only origin/main...HEAD | grep -Ev '^(server.js|server/requestBody.js|server/requestBody.test.mjs|package.json|.github/scripts/apply_request_body_413.py|.github/workflows/verify-request-body-413.yml)$' | wc -l)" -eq 0
      - name: Remove generated and temporary files
        run: |
          rm -rf node_modules dist package-lock.json
          git rm .github/scripts/apply_request_body_413.py .github/workflows/verify-request-body-413.yml
      - name: Commit verified changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server.js
          git commit -m 'Return HTTP 413 for oversized JSON requests'
          git push origin HEAD:${{ github.head_ref }}
