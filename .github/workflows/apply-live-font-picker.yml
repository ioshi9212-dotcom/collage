name: Apply live font picker improvements

on:
  push:
    branches:
      - agent/live-font-picker
    paths:
      - .github/workflows/apply-live-font-picker.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/live-font-picker
      - name: Patch font picker and live redraw
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          app_path = Path('src/AppLive.jsx')
          app = app_path.read_text(encoding='utf-8')

          app = replace_once(
              app,
              """  selectedDrawingId = null,
  printMode = false,""",
              """  selectedDrawingId = null,
  fontRenderVersion = 0,
  printMode = false,""",
              'ExtraPageLayers render version prop',
          )

          app = replace_once(
              app,
              """            key={item.id ?? `${pageIndex}-${item.x}-${item.y}`}""",
              """            key={`${item.id ?? `${pageIndex}-${item.x}-${item.y}`}-${item.fontId ?? DEFAULT_FONT_ID}-${fontRenderVersion}`}""",
              'text node render key',
          )

          app = replace_once(
              app,
              """  const photoUploadInFlightRef = useRef(false);""",
              """  const photoUploadInFlightRef = useRef(false);
  const fontLoadRequestRef = useRef(0);
  const fontSelectionRef = useRef('');""",
              'font request refs',
          )

          app = replace_once(
              app,
              """  const [inspectorTab, setInspectorTab] = useState('object');""",
              """  const [inspectorTab, setInspectorTab] = useState('object');
  const [fontRenderVersion, setFontRenderVersion] = useState(0);""",
              'font render state',
          )

          update_text = """  function updateText(id, patch) {
    updateExtraLayers((layers) => {
      const next = cloneDeep(layers) || { version: 1, pages: {} };
      Object.values(next.pages || {}).forEach((page) => {
        if (!Array.isArray(page.texts)) return;
        page.texts = page.texts.map((item) => (item.id === id ? { ...item, ...patch } : item));
      });
      return next;
    });
  }"""

          font_helpers = update_text + """

  function refreshLoadedFont(requestId) {
    if (requestId !== fontLoadRequestRef.current) return;
    setFontRenderVersion((current) => current + 1);
    window.requestAnimationFrame(() => stageRef.current?.batchDraw?.());
  }

  function applyTextFont(textItem, fontId) {
    if (!textItem?.id) return;
    const font = fontById(fontId);
    const requestKey = `${textItem.id}:${font.id}`;
    const duplicateEvent = fontSelectionRef.current === requestKey;
    fontSelectionRef.current = requestKey;

    if (!duplicateEvent || textItem.fontFamily !== font.family) {
      updateText(textItem.id, { fontId: font.id, fontFamily: font.family });
    }

    const requestId = ++fontLoadRequestRef.current;
    const fontSet = document.fonts;
    if (!fontSet?.load) {
      refreshLoadedFont(requestId);
      return;
    }

    const style = textItem.fontStyle === 'italic' ? 'italic' : 'normal';
    const weight = Number(textItem.fontWeight) || 500;
    const sample = String(textItem.text || 'АаБбВв');
    Promise.resolve(fontSet.load(`${style} ${weight} 16px ${font.family}`, sample))
      .then(() => refreshLoadedFont(requestId), () => refreshLoadedFont(requestId));
  }

  function stepTextFont(textItem, direction) {
    if (!textItem || !TEXT_FONTS.length) return;
    const currentIndex = Math.max(0, TEXT_FONTS.findIndex((font) => font.id === (textItem.fontId || DEFAULT_FONT_ID)));
    const nextIndex = (currentIndex + direction + TEXT_FONTS.length) % TEXT_FONTS.length;
    applyTextFont(textItem, TEXT_FONTS[nextIndex].id);
  }"""
          app = replace_once(app, update_text, font_helpers, 'live font helpers')

          preload_old = """  useEffect(() => {
    try { localStorage.removeItem(ALBUM_LAYERS_KEY); } catch { /* ignore localStorage errors */ }
  }, []);"""
          preload_new = preload_old + """

  useEffect(() => {
    if (albumMode !== 'text' || !document.fonts?.load) return undefined;
    let active = true;
    Promise.allSettled(TEXT_FONTS.map((font) => document.fonts.load(`16px ${font.family}`, 'АаБбВв')))
      .then(() => {
        if (!active) return;
        setFontRenderVersion((current) => current + 1);
        window.requestAnimationFrame(() => stageRef.current?.batchDraw?.());
      });
    return () => { active = false; };
  }, [albumMode]);"""
          app = replace_once(app, preload_old, preload_new, 'font preload effect')

          app = replace_once(
              app,
              """        selectedDrawingId={selectedDrawingId}
        onSelectText=""",
              """        selectedDrawingId={selectedDrawingId}
        fontRenderVersion={fontRenderVersion}
        onSelectText=""",
              'main text layer render version',
          )

          old_picker = """                <label className="field"><span>Гарнитура</span><select value={selectedText.fontId || DEFAULT_FONT_ID} onChange={(event) => updateText(selectedText.id, { fontId: event.target.value, fontFamily: fontById(event.target.value).family })}>{TEXT_FONTS.map((font) => <option key={font.id} value={font.id}>{font.label}</option>)}</select></label>"""
          new_picker = """                <div className="font-picker-control">
                  <button className="button font-picker-step" type="button" aria-label="Предыдущий шрифт" title="Предыдущий шрифт" onClick={() => stepTextFont(selectedText, -1)}>←</button>
                  <label className="field font-picker-field"><span>Гарнитура</span><select aria-label="Гарнитура" value={selectedText.fontId || DEFAULT_FONT_ID} onInput={(event) => applyTextFont(selectedText, event.currentTarget.value)} onChange={(event) => applyTextFont(selectedText, event.currentTarget.value)} onKeyDown={(event) => { if (event.key === 'ArrowLeft') { event.preventDefault(); stepTextFont(selectedText, -1); } if (event.key === 'ArrowRight') { event.preventDefault(); stepTextFont(selectedText, 1); } }}>{TEXT_FONTS.map((font) => <option key={font.id} value={font.id}>{font.label}</option>)}</select></label>
                  <button className="button font-picker-step" type="button" aria-label="Следующий шрифт" title="Следующий шрифт" onClick={() => stepTextFont(selectedText, 1)}>→</button>
                </div>
                <div className="font-picker-status">{fontById(selectedText.fontId || DEFAULT_FONT_ID).label} · {Math.max(1, TEXT_FONTS.findIndex((font) => font.id === (selectedText.fontId || DEFAULT_FONT_ID)) + 1)}/{TEXT_FONTS.length} · ↑↓ в списке</div>"""
          app = replace_once(app, old_picker, new_picker, 'font picker controls')
          app_path.write_text(app, encoding='utf-8')

          main_path = Path('src/main.jsx')
          main = main_path.read_text(encoding='utf-8')
          main = replace_once(
              main,
              "import './editor-shell-stage4c-larger-canvas.css';",
              "import './editor-shell-stage4c-larger-canvas.css';\nimport './font-picker.css';",
              'font picker CSS import',
          )
          main_path.write_text(main, encoding='utf-8')

          Path('src/font-picker.css').write_text("""/* Stable, live font browsing in the text inspector. */
.font-picker-control {
  display: grid;
  grid-template-columns: 34px minmax(0, 1fr) 34px;
  align-items: end;
  gap: 6px;
  width: 100%;
}

.font-picker-field {
  min-width: 0;
}

.font-picker-field select {
  min-width: 0;
  width: 100%;
}

.font-picker-step.button {
  width: 34px;
  min-width: 34px;
  height: 32px;
  min-height: 32px;
  padding: 0;
  font-size: 18px;
  line-height: 1;
}

.font-picker-status {
  min-height: 18px;
  margin-top: 5px;
  overflow: hidden;
  color: var(--ui-muted);
  font-size: 10px;
  font-weight: 750;
  line-height: 1.3;
  text-overflow: ellipsis;
  white-space: nowrap;
}
""", encoding='utf-8')

          Path('e2e/live-font-picker.spec.js').write_text("""import { expect, test } from '@playwright/test';

async function openTextInspector(page) {
  await page.setViewportSize({ width: 1640, height: 900 });
  await page.goto('/');
  await page.waitForFunction(() => typeof window.__collageApp?.getProject === 'function');
  await page.getByRole('button', { name: 'Текст', exact: true }).click();
  await page.getByRole('button', { name: '+ Обычный текст', exact: true }).click();
  await expect(page.getByRole('heading', { name: 'Настройки текста', exact: true })).toBeVisible();
}

function selectedTextFont(page) {
  return page.evaluate(() => {
    const project = window.__collageApp.getProject();
    const pageIndex = project.pages.findIndex((item) => item.id === project.currentPageId);
    const texts = project.extraLayers?.pages?.[String(pageIndex + 1)]?.texts || [];
    return texts[0] ? { fontId: texts[0].fontId, fontFamily: texts[0].fontFamily } : null;
  });
}

test('font picker applies selection immediately and cycles with arrows', async ({ page }) => {
  await openTextInspector(page);

  const picker = page.getByLabel('Гарнитура');
  await picker.selectOption('caslon');
  await expect.poll(() => selectedTextFont(page)).toMatchObject({ fontId: 'caslon' });

  await page.getByRole('button', { name: 'Следующий шрифт', exact: true }).click();
  await expect.poll(() => selectedTextFont(page)).toMatchObject({ fontId: 'agreverence' });

  await page.getByRole('button', { name: 'Предыдущий шрифт', exact: true }).click();
  await expect.poll(() => selectedTextFont(page)).toMatchObject({ fontId: 'caslon' });
  await expect(page.locator('.font-picker-status')).toContainText('Caslon Becker');
});
""", encoding='utf-8')

          Path('src/editor/fontPickerIntegration.test.mjs').write_text("""import assert from 'node:assert/strict';
import { readFile } from 'node:fs/promises';

const app = await readFile(new URL('../AppLive.jsx', import.meta.url), 'utf8');
const main = await readFile(new URL('../main.jsx', import.meta.url), 'utf8');
const css = await readFile(new URL('../font-picker.css', import.meta.url), 'utf8');

for (const marker of [
  'function applyTextFont(textItem, fontId)',
  'document.fonts.load',
  'setFontRenderVersion',
  'fontRenderVersion={fontRenderVersion}',
  'aria-label="Предыдущий шрифт"',
  'aria-label="Следующий шрифт"',
  'onInput={(event) => applyTextFont',
  "event.key === 'ArrowLeft'",
  "event.key === 'ArrowRight'",
]) assert.ok(app.includes(marker), `missing live font picker marker: ${marker}`);

assert.ok(main.includes("import './font-picker.css';"), 'font picker styles must be imported');
assert.ok(css.includes('grid-template-columns: 34px minmax(0, 1fr) 34px;'), 'font picker width must stay stable');
console.log('live font picker integration checks passed');
""", encoding='utf-8')

          package_path = Path('package.json')
          package_json = json.loads(package_path.read_text(encoding='utf-8'))
          test_script = package_json['scripts']['test']
          marker = 'src/editor/fontPickerIntegration.test.mjs'
          if marker not in test_script:
              package_json['scripts']['test'] = test_script + ' && node ' + marker
          package_path.write_text(json.dumps(package_json, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          Path('.github/workflows/apply-live-font-picker.yml').unlink(missing_ok=True)
          PY
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add live font picker controls"
          git push origin HEAD:agent/live-font-picker
