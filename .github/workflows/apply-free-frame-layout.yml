name: Apply free frame layout patch

on:
  push:
    branches: [agent/preserve-free-frame-layout]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/preserve-free-frame-layout
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply patch
        run: node .github/scripts/apply-free-frame-layout.mjs
      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx
          git commit -m "Preserve free-window geometry on add and delete"
          git push origin HEAD:agent/preserve-free-frame-layout
