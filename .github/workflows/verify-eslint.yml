name: Configure and verify ESLint

on:
  push:
    branches: [agent/add-eslint]

permissions:
  contents: write

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-eslint
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install ESLint dependencies
        run: |
          npm install --save-dev --save-exact eslint@10.7.0 @eslint/js@10.0.1 eslint-plugin-react-hooks@latest globals@latest
          npm pkg set scripts.lint="eslint ."
      - name: Apply focused lint fixes
        run: python .github/scripts/apply-eslint-fixes.py
      - name: Ensure lint is in permanent CI
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          text = path.read_text()
          marker = "      - name: Test\n        run: npm test\n"
          replacement = "      - name: Lint\n        run: npm run lint\n" + marker
          if '      - name: Lint\n' not in text:
              if marker not in text:
                  raise SystemExit('Expected Test step was not found')
              text = text.replace(marker, replacement, 1)
          path.write_text(text)
          PY
      - name: Clean install from lockfile
        run: |
          cp package-lock.json /tmp/package-lock.json
          rm -rf node_modules
          npm ci
          cmp package-lock.json /tmp/package-lock.json
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit verified ESLint setup
        run: |
          rm -rf node_modules dist
          rm -f .github/workflows/verify-eslint.yml .github/scripts/apply-eslint-fixes.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          python - <<'PY'
          import subprocess
          allowed = {
              '.github/scripts/apply-eslint-fixes.py',
              '.github/workflows/ci.yml',
              '.github/workflows/verify-eslint.yml',
              'package.json',
              'package-lock.json',
              'public/cloud-auth.test.mjs',
              'public/project-storage.js',
              'server.js',
              'src/editor/project-storage.test.mjs',
              'src/editor/projectLoad.test.mjs',
          }
          staged = set(subprocess.check_output(['git', 'diff', '--cached', '--name-only'], text=True).splitlines())
          unexpected = staged - allowed
          required = {
              '.github/scripts/apply-eslint-fixes.py',
              '.github/workflows/verify-eslint.yml',
              'package-lock.json',
          }
          if unexpected:
              raise SystemExit(f'Unexpected staged files: {sorted(unexpected)}')
          if not required.issubset(staged):
              raise SystemExit(f'Missing required staged files: {sorted(required - staged)}')
          print('\n'.join(sorted(staged)))
          PY
          git commit -m "Add ESLint checks"
          git push origin HEAD:agent/add-eslint
