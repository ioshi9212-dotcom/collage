name: Lint diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-report:
    if: github.head_ref == 'agent/layer-safety-and-ci'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Capture lint output
        id: lint
        shell: bash
        run: |
          set +e
          npm run lint > lint-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint-output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: layer-patch-source
          path: |
            src/AppLive.jsx
            src/editor/extraLayers.test.mjs
            scripts/apply_layer_safety_patch.py
      - name: Preserve lint result
        run: exit "${{ steps.lint.outputs.status }}"
