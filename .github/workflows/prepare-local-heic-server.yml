name: Prepare local HEIC server conversion

on:
  push:
    branches:
      - agent/local-heic-server-conversion

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Update dependency lock
        run: npm install --package-lock-only
      - name: Install dependencies
        run: npm ci
      - name: Verify Sharp HEIF support
        run: |
          node --input-type=module - <<'NODE'
          import sharp from 'sharp';
          console.log(JSON.stringify({ heif: sharp.format.heif, jpeg: sharp.format.jpeg }, null, 2));
          if (!sharp.format.heif?.input) throw new Error('Sharp build has no HEIF/HEIC input support');
          NODE
      - name: Lint, test and build
        run: |
          npm run lint
          npm test
          npm run build
      - name: Remove temporary workflow and commit lockfile
        run: |
          rm .github/workflows/prepare-local-heic-server.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/prepare-local-heic-server.yml
          git commit -m "Lock server HEIC conversion dependencies"
          git push

# Trigger after workflow registration.
