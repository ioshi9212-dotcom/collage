name: Editor shell v3 compatibility

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/apply_editor_shell_v3_compat.py
      - .github/workflows/editor-shell-v3-compat.yml

permissions:
  contents: write

jobs:
  patch-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/editor-shell-v3-polish
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: python3 scripts/apply_editor_shell_v3_compat.py
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Commit verified compatibility fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx src/editor-shell-v2.css e2e/booklet-print.spec.js e2e/editor-shell-v3.spec.js
          git diff --cached --quiet && exit 0
          git commit -m "Fix shell v3 controls and overlay compatibility"
          git push origin HEAD:design/editor-shell-v3-polish
