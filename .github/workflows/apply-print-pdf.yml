name: Apply print PDF editor patch

on:
  push:
    branches: [agent/print-pdf-metadata]
    paths:
      - '.github/scripts/apply_print_pdf.py'
      - '.github/scripts/fix_print_files_bom.py'
      - '.github/workflows/apply-print-pdf.yml'

permissions:
  contents: write

concurrency:
  group: apply-print-pdf-editor-patch
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/print-pdf-metadata
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Fix explicit XMP BOM
        run: python .github/scripts/fix_print_files_bom.py
      - name: Apply guarded editor patch
        run: python .github/scripts/apply_print_pdf.py
      - name: Check patch
        run: git diff --check
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit editor integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx src/editor/printFiles.js
          git diff --cached --check
          git commit -m "Connect print PDF export to editor"
          git push origin HEAD:agent/print-pdf-metadata

# Verified independently by the read-only patch workflow before this retry.
