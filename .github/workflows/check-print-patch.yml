name: Check print geometry patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/scripts/apply_print_geometry.py'
      - '.github/workflows/check-print-patch.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/print-geometry
      - name: Apply guarded patch
        run: python .github/scripts/apply_print_geometry.py
      - name: Show patch
        run: git diff --check && git diff --stat
