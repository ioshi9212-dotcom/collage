name: Check print geometry patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/scripts/apply_print_geometry.py'
      - '.github/scripts/run_print_geometry_patch.py'
      - '.github/workflows/check-print-patch.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/print-geometry
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply guarded patch
        run: python .github/scripts/run_print_geometry_patch.py
      - name: Check patch
        run: git diff --check
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
