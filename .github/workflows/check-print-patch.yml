name: Check print geometry patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/scripts/apply_print_geometry.py'
      - '.github/scripts/run_print_geometry_patch.py'
      - '.github/workflows/check-print-patch.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/print-geometry
      - name: Apply guarded patch
        run: python .github/scripts/run_print_geometry_patch.py
      - name: Show patch
        run: git diff --check && git diff --stat
      - name: Upload patched product files
        uses: actions/upload-artifact@v4
        with:
          name: print-geometry-patched-files
          path: |
            src/AppLive.jsx
            src/styles.css
          if-no-files-found: error
          retention-days: 1
