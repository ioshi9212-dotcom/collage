name: Editor shell v2 patch

on:
  push:
    branches:
      - design/editor-shell-v2
    paths:
      - scripts/apply_editor_shell_v2.py
      - .github/workflows/editor-shell-v2-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/editor-shell-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Relax sequential replacement guard
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_editor_shell_v2.py')
          text = path.read_text(encoding='utf-8')
          old = '    if count != 1:\n        raise SystemExit(f"{label}: expected one match, found {count}")'
          new = '    if count < 1:\n        raise SystemExit(f"{label}: expected at least one match, found {count}")'
          if old not in text:
              raise SystemExit('replace_once guard was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Apply guarded shell patch
        run: python3 scripts/apply_editor_shell_v2.py
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit product changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx src/main.jsx e2e/print-geometry.spec.js
          git diff --cached --quiet && exit 0
          git commit -m "Implement editor shell v2 structure"
          git push origin HEAD:design/editor-shell-v2
