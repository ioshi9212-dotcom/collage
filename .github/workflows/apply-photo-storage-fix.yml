name: Apply and verify photo storage fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.head_ref == 'agent/deduplicate-photo-storage' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply exact AppLive patch
        run: node scripts/apply-photo-storage-fix.mjs
      - name: Install dependencies
        run: npm install
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Verify compact storage integration
        run: |
          grep -F "compactProjectPhotos(library, pages)" src/AppLive.jsx
          grep -F "hydrateProjectPhotos(data.library, data.pages)" src/AppLive.jsx
          ! grep -F "library," <(sed -n '/function project()/,/^  }/p' src/AppLive.jsx)
          git diff --check
      - name: Remove temporary automation
        run: rm scripts/apply-photo-storage-fix.mjs .github/workflows/apply-photo-storage-fix.yml
      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx src/editor/photoStorage.js src/editor/photoStorage.test.mjs package.json scripts/apply-photo-storage-fix.mjs .github/workflows/apply-photo-storage-fix.yml
          git commit -m "Deduplicate photo data in saved projects"
          git push origin HEAD:${{ github.head_ref }}
