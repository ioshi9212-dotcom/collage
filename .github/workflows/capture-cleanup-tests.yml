name: Capture cleanup test diagnostics

on:
  push:
    branches:
      - cleanup/remove-legacy-editor-shell
    paths:
      - .github/workflows/capture-cleanup-tests.yml

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/remove-legacy-editor-shell
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture tests
        run: |
          npm test > cleanup-test-output.txt 2>&1 || true
          rm .github/workflows/capture-cleanup-tests.yml
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture cleanup test diagnostics"
          git push origin HEAD:cleanup/remove-legacy-editor-shell
