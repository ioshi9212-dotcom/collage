name: Editor shell storage compatibility

on:
  push:
    branches:
      - design/editor-shell-v2
    paths:
      - scripts/add_editor_shell_storage_compat.py
      - .github/workflows/editor-shell-storage-compat.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/editor-shell-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply guarded compatibility patch
        run: python3 scripts/add_editor_shell_storage_compat.py
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit product change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx
          git diff --cached --quiet && exit 0
          git commit -m "Keep local project storage compatible with editor shell v2"
          git push origin HEAD:design/editor-shell-v2
