name: Check print PDF editor patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/scripts/apply_print_pdf.py'
      - '.github/scripts/fix_print_files_bom.py'
      - '.github/workflows/check-print-pdf-patch.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/print-pdf-metadata
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Fix explicit XMP BOM
        run: python .github/scripts/fix_print_files_bom.py
      - name: Apply guarded editor patch
        run: python .github/scripts/apply_print_pdf.py
      - name: Check patch
        run: git diff --check
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Upload verified product files
        uses: actions/upload-artifact@v4
        with:
          name: print-pdf-patched-editor
          path: |
            src/AppLive.jsx
            src/editor/printFiles.js
          if-no-files-found: error
          retention-days: 1
