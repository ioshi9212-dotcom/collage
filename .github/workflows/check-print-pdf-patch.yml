name: Check print PDF editor patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/scripts/apply_print_pdf.py'
      - '.github/workflows/check-print-pdf-patch.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/print-pdf-metadata
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply guarded patch
        run: python .github/scripts/apply_print_pdf.py
      - name: Check patch
        run: git diff --check
      - name: Install dependencies
        run: npm ci
      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint 2>&1 | tee lint-report.txt
      - name: Upload patched editor and lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: print-pdf-patched-editor
          path: |
            src/AppLive.jsx
            lint-report.txt
          if-no-files-found: error
          retention-days: 1
      - name: Stop on lint failure
        if: steps.lint.outcome == 'failure'
        run: exit 1
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
