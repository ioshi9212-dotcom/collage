name: Apply layer safety patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/layer-safety-and-ci' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/layer-safety-and-ci
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Repair temporary patch quoting
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_layer_safety_patch.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace("\n\"\"\",\n'remove unused page mover')", "\n'',\n'remove unused page mover')")
          text = text.replace("\n\"\"\",\n'remove unused visible layer page list')", "\n'',\n'remove unused visible layer page list')")
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply verified source patch
        run: python scripts/apply_layer_safety_patch.py
      - name: Install dependencies
        run: npm ci
      - name: Validate patch
        run: |
          npm run lint
          npm test
          npm run build
          git diff --check
      - name: Commit patched editor
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx src/editor/extraLayers.test.mjs
          if git diff --cached --quiet; then
            echo "Patch already applied"
            exit 0
          fi
          git commit -m "Apply layer safety integration"
          git push origin HEAD:agent/layer-safety-and-ci
