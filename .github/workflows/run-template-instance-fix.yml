name: Run template instance fix

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.head_ref == 'agent/fix-template-instance-ids' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-template-instance-ids
          fetch-depth: 0

      - name: Apply focused template-instance patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/AppLive.jsx')
          text = path.read_text(encoding='utf-8')

          old_runtime = """  function runtimePageFromTemplate(page, index) {
    const next = cloneDeep(page);
    return {
      ...next,
      id: makeId(),
      title: `Страница ${index + 1}`,
      frames: Array.isArray(next?.frames) ? next.frames.map((frame) => ({ ...frame, photo: null })) : [],
    };
  }
"""
          new_runtime = """  function runtimePageFromTemplate(page, index) {
    const next = clonePageForDuplicate(page, index + 1);
    return {
      ...next,
      title: `Страница ${index + 1}`,
      frames: Array.isArray(next?.frames) ? next.frames.map((frame) => ({ ...frame, photo: null })) : [],
    };
  }
"""

          old_layers = """      const cleaned = {
        texts: Array.isArray(sourcePage?.texts) ? cloneDeep(sourcePage.texts) : [],
        drawings: Array.isArray(sourcePage?.drawings) ? cloneDeep(sourcePage.drawings) : [],
        templates: [],
      };
"""
          new_layers = """      const cleaned = cloneLayerPage({
        texts: Array.isArray(sourcePage?.texts) ? sourcePage.texts : [],
        drawings: Array.isArray(sourcePage?.drawings) ? sourcePage.drawings : [],
        templates: [],
      });
"""

          if old_runtime not in text:
              raise SystemExit('runtimePageFromTemplate block not found')
          if old_layers not in text:
              raise SystemExit('remapTemplateLayers block not found')

          text = text.replace(old_runtime, new_runtime, 1)
          text = text.replace(old_layers, new_layers, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify independent template instances
        shell: bash
        run: |
          node <<'NODE'
          let idCounter = 0;
          const makeId = () => `fresh-${++idCounter}`;
          const cloneDeep = (value) => JSON.parse(JSON.stringify(value));

          function clonePageForDuplicate(page, number) {
            const next = cloneDeep(page) || {};
            const frameIdMap = new Map();
            const remapFrameId = (frameId) => {
              if (frameId == null) return makeId();
              if (!frameIdMap.has(frameId)) frameIdMap.set(frameId, makeId());
              return frameIdMap.get(frameId);
            };
            const frames = Array.isArray(next.frames)
              ? next.frames.map((frame) => ({ ...frame, id: remapFrameId(frame?.id) }))
              : [];
            let layout = next.layout ?? null;
            if (layout && Array.isArray(layout.rows)) {
              layout = {
                ...layout,
                rows: layout.rows.map((row) => ({
                  ...row,
                  id: makeId(),
                  columns: Array.isArray(row?.columns)
                    ? row.columns.map((column) => ({
                      ...column,
                      id: makeId(),
                      frameId: remapFrameId(column?.frameId),
                    }))
                    : [],
                })),
              };
            }
            return { ...next, id: makeId(), title: `Страница ${number}`, layout, frames };
          }

          function runtimePageFromTemplate(page, index) {
            const next = clonePageForDuplicate(page, index + 1);
            return {
              ...next,
              title: `Страница ${index + 1}`,
              frames: Array.isArray(next?.frames) ? next.frames.map((frame) => ({ ...frame, photo: null })) : [],
            };
          }

          function cloneLayerPage(pageLayers) {
            if (!pageLayers) return null;
            const cloned = cloneDeep(pageLayers);
            ['texts', 'drawings', 'templates'].forEach((key) => {
              if (Array.isArray(cloned?.[key])) cloned[key] = cloned[key].map((item) => ({ ...item, id: makeId() }));
            });
            return cloned;
          }

          const sourcePage = {
            id: 'template-page',
            frames: [
              { id: 'frame-a', x: 10, y: 20, width: 300, height: 400, photo: { id: 'photo', zoom: 2 } },
              { id: 'frame-b', x: 330, y: 20, width: 200, height: 400, photo: null },
            ],
            layout: {
              type: 'grid',
              rows: [{ id: 'row-a', columns: [
                { id: 'column-a', frameId: 'frame-a', width: 300 },
                { id: 'column-b', frameId: 'frame-b', width: 200 },
              ] }],
            },
          };

          const firstPage = runtimePageFromTemplate(sourcePage, 0);
          const secondPage = runtimePageFromTemplate(sourcePage, 0);
          if (firstPage.id === secondPage.id) throw new Error('page IDs collided');
          if (firstPage.frames.some((frame, index) => frame.id === secondPage.frames[index].id)) throw new Error('frame IDs collided');
          if (firstPage.frames.some((frame) => frame.photo !== null)) throw new Error('template photos were not cleared');
          if (firstPage.frames[0].x !== 10 || firstPage.frames[0].width !== 300) throw new Error('geometry changed');
          const firstFrameIds = new Set(firstPage.frames.map((frame) => frame.id));
          for (const row of firstPage.layout.rows) {
            for (const column of row.columns) {
              if (!firstFrameIds.has(column.frameId)) throw new Error('layout frame reference is broken');
            }
          }

          const sourceLayers = {
            texts: [{ id: 'text-a', text: 'Title', x: 10 }],
            drawings: [{ id: 'line-a', type: 'line', length: 100 }],
            templates: [],
          };
          const firstLayers = cloneLayerPage(sourceLayers);
          const secondLayers = cloneLayerPage(sourceLayers);
          if (firstLayers.texts[0].id === secondLayers.texts[0].id) throw new Error('text IDs collided');
          if (firstLayers.drawings[0].id === secondLayers.drawings[0].id) throw new Error('drawing IDs collided');
          if (sourceLayers.texts[0].id !== 'text-a' || sourceLayers.drawings[0].id !== 'line-a') throw new Error('source template mutated');
          console.log('independent template instance checks passed');
          NODE

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Commit focused fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx
          git commit -m "Give template instances unique IDs"
          git push origin HEAD:agent/fix-template-instance-ids
