name: Extract and verify page model

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/extract-page-model
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Keep the extraction mechanical and verify it against the full editor suite.
      - name: Extract page model helpers
        run: python .github/scripts/extract-page-model.py
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Verify focused diff
        run: |
          git diff --check
          python - <<'PY'
          import subprocess
          allowed = {'package.json', 'src/AppLive.jsx'}
          changed = set(subprocess.check_output(['git', 'diff', '--name-only'], text=True).splitlines())
          unexpected = changed - allowed
          if unexpected:
              raise SystemExit(f'Unexpected generated files: {sorted(unexpected)}')
          if not allowed.issubset(changed):
              raise SystemExit(f'Missing expected generated files: {sorted(allowed - changed)}')
          PY
      - name: Commit verified extraction
        run: |
          rm -rf node_modules dist
          rm -f .github/workflows/verify-page-model.yml .github/scripts/extract-page-model.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          python - <<'PY'
          import subprocess
          allowed = {
              '.github/scripts/extract-page-model.py',
              '.github/workflows/verify-page-model.yml',
              'package.json',
              'src/AppLive.jsx',
          }
          staged = set(subprocess.check_output(['git', 'diff', '--cached', '--name-only'], text=True).splitlines())
          unexpected = staged - allowed
          if unexpected:
              raise SystemExit(f'Unexpected staged files: {sorted(unexpected)}')
          if not allowed.issubset(staged):
              raise SystemExit(f'Missing expected staged files: {sorted(allowed - staged)}')
          print('\n'.join(sorted(staged)))
          PY
          git commit -m "Extract page model utilities"
          git push origin HEAD:agent/extract-page-model
