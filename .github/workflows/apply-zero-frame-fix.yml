name: Apply zero photo frame fix

on:
  push:
    branches:
      - agent/fix-zero-photo-frames

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-zero-photo-frames
          fetch-depth: 0

      - name: Preserve zero photo frame pages
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/AppLive.jsx')
          text = path.read_text(encoding='utf-8')
          old = """function resolvePageFrameCount(page, fallbackSettings = DEFAULT_SETTINGS) {
            if (page?.isBlankPage) return 0;
            const saved = Number(page?.frameCount);
            if (Number.isFinite(saved) && saved >= 1) return clamp(saved, 1, 9);
            const fromLayout = countFramesInLayout(page?.layout);
            if (fromLayout) return clamp(fromLayout, 1, 9);
            const fromFrames = Array.isArray(page?.frames) ? page.frames.length : 0;
            if (fromFrames) return clamp(fromFrames, 1, 9);
            return clamp(Number(fallbackSettings.frameCount) || DEFAULT_SETTINGS.frameCount, 1, 9);
          }
          """
          new = """function resolvePageFrameCount(page, fallbackSettings = DEFAULT_SETTINGS) {
            if (page?.isBlankPage) return 0;
            const saved = Number(page?.frameCount);
            if (Number.isFinite(saved) && saved >= 0) return clamp(saved, 0, 9);
            const fromLayout = countFramesInLayout(page?.layout);
            if (fromLayout) return clamp(fromLayout, 1, 9);
            const fromFrames = Array.isArray(page?.frames) ? page.frames.length : 0;
            if (fromFrames) return clamp(fromFrames, 1, 9);
            const fallback = Number(fallbackSettings.frameCount);
            return Number.isFinite(fallback)
              ? clamp(fallback, 0, 9)
              : clamp(DEFAULT_SETTINGS.frameCount, 0, 9);
          }
          """
          if old not in text:
              raise SystemExit('Target resolvePageFrameCount block was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Verify zero frame logic
        shell: bash
        run: |
          node <<'NODE'
          function clamp(value, min, max) {
            const number = Number(value);
            if (!Number.isFinite(number)) return min;
            return Math.min(max, Math.max(min, number));
          }
          const DEFAULT_SETTINGS = { frameCount: 5 };
          function countFramesInLayout(layout) {
            if (!layout?.rows) return 0;
            return layout.rows.reduce((sum, row) => sum + (Array.isArray(row.columns) ? row.columns.length : 0), 0);
          }
          function resolvePageFrameCount(page, fallbackSettings = DEFAULT_SETTINGS) {
            if (page?.isBlankPage) return 0;
            const saved = Number(page?.frameCount);
            if (Number.isFinite(saved) && saved >= 0) return clamp(saved, 0, 9);
            const fromLayout = countFramesInLayout(page?.layout);
            if (fromLayout) return clamp(fromLayout, 1, 9);
            const fromFrames = Array.isArray(page?.frames) ? page.frames.length : 0;
            if (fromFrames) return clamp(fromFrames, 1, 9);
            const fallback = Number(fallbackSettings.frameCount);
            return Number.isFinite(fallback)
              ? clamp(fallback, 0, 9)
              : clamp(DEFAULT_SETTINGS.frameCount, 0, 9);
          }
          const cases = [
            [resolvePageFrameCount({ frameCount: 0, layout: null, frames: [] }, { frameCount: 0 }), 0, 'saved zero'],
            [resolvePageFrameCount({ frameCount: 4, frames: [] }, { frameCount: 0 }), 4, 'saved nonzero'],
            [resolvePageFrameCount({ frames: [{}, {}] }, { frameCount: 0 }), 2, 'legacy frames'],
            [resolvePageFrameCount({}, { frameCount: 0 }), 0, 'zero fallback'],
            [resolvePageFrameCount({}, {}), 5, 'default fallback'],
          ];
          for (const [actual, expected, label] of cases) {
            if (actual !== expected) throw new Error(`${label}: expected ${expected}, got ${actual}`);
          }
          console.log('zero frame count checks passed');
          NODE

      - name: Install and build
        run: |
          npm install
          npm run build

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx
          git commit -m "Preserve zero photo frame pages"
          git push origin HEAD:agent/fix-zero-photo-frames
