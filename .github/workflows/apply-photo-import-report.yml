name: Apply photo import report patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/photo-import-report'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply patch
        run: node scripts/apply-photo-import-report.mjs
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx scripts/apply-photo-import-report.mjs .github/workflows/apply-photo-import-report.yml
          git commit -m "Show detailed photo import results"
          git push origin HEAD:${{ github.head_ref }}
