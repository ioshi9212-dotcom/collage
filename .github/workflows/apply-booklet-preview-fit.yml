name: Apply booklet preview width safety

on:
  push:
    branches:
      - cleanup/remove-legacy-editor-shell
    paths:
      - .github/workflows/apply-booklet-preview-fit.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/remove-legacy-editor-shell
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reserve the full fitted-frame width
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, rmSync, writeFileSync } from 'node:fs';

          const path = 'src/AppLive.jsx';
          const before = `      const nextViewport = getStablePreviewViewport({\n        containerWidth: rect.width,\n        viewportHeight: window.innerHeight,\n        horizontalPadding,\n      });`;
          const after = `      const nextViewport = getStablePreviewViewport({\n        containerWidth: rect.width,\n        viewportHeight: window.innerHeight,\n        horizontalPadding,\n        framePadding: 30,\n      });`;
          const source = readFileSync(path, 'utf8');
          const matches = source.split(before).length - 1;
          if (matches !== 1) throw new Error(`Expected one preview viewport block, found ${matches}`);
          writeFileSync(path, source.replace(before, after), 'utf8');
          rmSync('.github/workflows/apply-booklet-preview-fit.yml', { force: true });
          NODE
      - name: Commit preview fit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep booklet preview inside its frame"
          git push origin HEAD:cleanup/remove-legacy-editor-shell
