name: Remove unused preview width margin

on:
  push:
    branches:
      - cleanup/remove-legacy-editor-shell
    paths:
      - .github/workflows/remove-unused-preview-width-margin.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/remove-legacy-editor-shell
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Remove ineffective width-only margin
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, rmSync, writeFileSync } from 'node:fs';

          const path = 'src/AppLive.jsx';
          const before = `        horizontalPadding,\n        framePadding: 30,\n`;
          const after = `        horizontalPadding,\n`;
          const source = readFileSync(path, 'utf8');
          const matches = source.split(before).length - 1;
          if (matches !== 1) throw new Error(`Expected one framePadding override, found ${matches}`);
          writeFileSync(path, source.replace(before, after), 'utf8');
          rmSync('.github/workflows/remove-unused-preview-width-margin.yml', { force: true });
          NODE
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove ineffective preview width margin"
          git push origin HEAD:cleanup/remove-legacy-editor-shell
