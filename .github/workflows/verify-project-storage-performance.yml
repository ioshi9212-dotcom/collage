name: Diagnose project storage performance

on:
  pull_request:
    branches: [main]
    paths:
      - 'public/project-storage.js'
      - 'src/AppLive.jsx'
      - 'index.html'
      - 'src/editor/project-storage.test.mjs'
      - 'package.json'
      - '.github/scripts/apply_project_storage_performance.py'
      - '.github/workflows/verify-project-storage-performance.yml'

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply exact performance patch
        run: python .github/scripts/apply_project_storage_performance.py
      - name: Capture focused test output
        shell: bash
        run: |
          set +e
          node src/editor/project-storage.test.mjs > project-storage-test-output.txt 2>&1
          status=$?
          echo "exit_status=$status" >> project-storage-test-output.txt
          cat project-storage-test-output.txt
          exit 0
      - name: Remove temporary automation
        run: rm .github/scripts/apply_project_storage_performance.py .github/workflows/verify-project-storage-performance.yml
      - name: Commit diagnostic snapshot
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Capture project storage test diagnostic'
          git push origin HEAD:${{ github.head_ref }}
