name: Materialize stable preview scale

on:
  push:
    branches: [agent/stable-preview-scale]
    paths:
      - '.github/scripts/apply_stable_preview_scale.py'
      - '.github/workflows/materialize-stable-preview-scale.yml'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/stable-preview-scale
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply guarded preview patch
        run: python .github/scripts/apply_stable_preview_scale.py
      - name: Check patch
        run: git diff --check
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit verified editor changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/AppLive.jsx
          git commit -m "Stabilize preview scale across page switches"
          git push origin HEAD:agent/stable-preview-scale

# The product commit is created only after every verification step succeeds.
