name: Apply photo upload progress

on:
  push:
    branches:
      - agent/photo-upload-progress

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/photo-upload-progress
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply progress UI patch
        run: node scripts/apply-photo-upload-progress.mjs
      - name: Remove temporary patch files
        run: rm scripts/apply-photo-upload-progress.mjs .github/workflows/apply-photo-upload-progress.yml
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add photo upload progress indicator"
          git push origin HEAD:agent/photo-upload-progress
