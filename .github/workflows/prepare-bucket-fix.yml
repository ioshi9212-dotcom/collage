name: Prepare bucket upload fix

on:
  push:
    branches:
      - agent/fix-bucket-upload

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Update dependency lock
        run: npm install --package-lock-only
      - name: Improve cloud upload messages
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/editor/cloudPhotoBridge.js')
          text = path.read_text()
          text = text.replace(
              "throw new Error(`Не удалось преобразовать HEIC «${first?.file?.name || 'Фото'}». Проверь интернет и повтори.`);",
              "throw new Error(`Не удалось преобразовать HEIC «${first?.file?.name || 'Фото'}»: ${first?.error?.message || 'неизвестная ошибка'}`);",
          )
          text = text.replace(
              'async function fallbackLocalUpload(files) {',
              'async function fallbackLocalUpload(files, cloudError) {',
          )
          old_status = """  const failed = preparation.failed.length + result.failed.length;
  setStatus(failed
    ? `Облако фото недоступно: локально сохранено ${result.loaded.length}, пропущено ${failed}`
    : 'Облако фото недоступно: фотографии сохранены только в этом браузере');"""
          new_status = """  const failed = preparation.failed.length + result.failed.length;
  const reason = String(cloudError?.message || 'неизвестная ошибка облачного хранилища').slice(0, 220);
  const localSummary = failed
    ? `Локально сохранено ${result.loaded.length}, пропущено ${failed}.`
    : `Локально сохранено ${result.loaded.length}.`;
  setStatus(`Не удалось загрузить в облако: ${reason} ${localSummary} На другом устройстве эти фото не появятся.`);"""
          if old_status not in text:
              raise SystemExit('fallback status block not found')
          text = text.replace(old_status, new_status)
          old_catch = """    .catch(async (error) => {
      console.warn('Cloud photo upload failed', error);
      setStatus(error.message || 'Не удалось загрузить фотографии в облако');
      await fallbackLocalUpload(files).catch(() => {});
    })"""
          new_catch = """    .catch(async (error) => {
      console.warn('Cloud photo upload failed', error);
      await fallbackLocalUpload(files, error).catch(() => {
        setStatus(`Не удалось загрузить фотографии: ${error?.message || 'ошибка облачного хранилища'}`);
      });
    })"""
          if old_catch not in text:
              raise SystemExit('cloud upload catch block not found')
          text = text.replace(old_catch, new_catch)
          text = text.replace(
              "setStatus(`Фото в облаке: ${additions.length}${converted}${skipped ? ` · пропущено: ${skipped}` : ''}`);",
              "setStatus(`Фото загружены в облако: ${additions.length}${converted}${skipped ? ` · пропущено: ${skipped}` : ''}. Нажми «Сохранить», чтобы синхронизировать альбом.`);",
          )
          path.write_text(text)
          PY
      - name: Commit generated changes
        run: |
          if git diff --quiet -- package-lock.json src/editor/cloudPhotoBridge.js; then
            echo "Nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json src/editor/cloudPhotoBridge.js
          git commit -m "Prepare reliable bucket upload"
          git push
