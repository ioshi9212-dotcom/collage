name: Generate and verify package lock

on:
  push:
    branches: [agent/add-package-lock]

permissions:
  contents: write

jobs:
  lock-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-package-lock
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate package lock
        run: npm install --package-lock-only --ignore-scripts
      - name: Switch permanent CI to npm ci
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          text = path.read_text()
          old = '        run: npm install\n'
          new = '        run: npm ci\n'
          if old not in text:
              raise SystemExit('Expected npm install line was not found in CI workflow')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Clean install from lockfile
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Verify reproducible install
        run: |
          cp package-lock.json /tmp/package-lock.json
          rm -rf node_modules dist
          npm ci
          cmp package-lock.json /tmp/package-lock.json
      - name: Commit verified lockfile
        run: |
          rm -rf node_modules dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/generate-package-lock.yml
          git add package-lock.json .github/workflows/ci.yml
          git diff --cached --stat
          git commit -m "Add reproducible npm lockfile"
          git push origin HEAD:agent/add-package-lock
