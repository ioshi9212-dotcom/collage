name: Editor shell v2 artifact

on:
  pull_request:
    branches:
      - main
    paths:
      - src/editor-shell-v2.css
      - scripts/apply_editor_shell_v2.py
      - .github/workflows/editor-shell-v2-artifact.yml
      - .github/workflows/editor-shell-v2-patch.yml

permissions:
  contents: read

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply guarded shell patch
        run: python3 scripts/apply_editor_shell_v2.py
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Upload verified files
        uses: actions/upload-artifact@v4
        with:
          name: editor-shell-v2-files
          path: |
            src/AppLive.jsx
            src/main.jsx
            e2e/print-geometry.spec.js
          if-no-files-found: error
