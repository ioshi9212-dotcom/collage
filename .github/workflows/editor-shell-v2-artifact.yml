name: Editor shell v2 artifact

on:
  pull_request:
    branches:
      - main
    paths:
      - src/editor-shell-v2.css
      - scripts/apply_editor_shell_v2.py
      - .github/workflows/editor-shell-v2-artifact.yml
      - .github/workflows/editor-shell-v2-patch.yml

permissions:
  contents: read

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Relax sequential replacement guard
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_editor_shell_v2.py')
          text = path.read_text(encoding='utf-8')
          old = '    if count != 1:\n        raise SystemExit(f"{label}: expected one match, found {count}")'
          new = '    if count < 1:\n        raise SystemExit(f"{label}: expected at least one match, found {count}")'
          if old not in text:
              raise SystemExit('replace_once guard was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Apply guarded shell patch
        id: patch
        shell: bash
        run: |
          set +e
          python3 scripts/apply_editor_shell_v2.py > patch.log 2>&1
          status=$?
          cat patch.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editor-shell-v2-patch-log
          path: patch.log
          if-no-files-found: error
      - name: Fail when patch failed
        if: steps.patch.outputs.status != '0'
        run: exit 1
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        id: tests
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          status=$?
          cat test.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editor-shell-v2-test-log
          path: test.log
          if-no-files-found: error
      - name: Fail when tests failed
        if: steps.tests.outputs.status != '0'
        run: exit 1
      - name: Build
        run: npm run build
      - name: Upload verified files
        uses: actions/upload-artifact@v4
        with:
          name: editor-shell-v2-files
          path: |
            src/AppLive.jsx
            src/main.jsx
            e2e/print-geometry.spec.js
          if-no-files-found: error
